<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>I Love You 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a0000, #000000 80%);
    font-family: 'Cinzel', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Névoa */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://i.imgur.com/8s5QF5G.png');
    opacity: 0.08;
    animation: fog 60s linear infinite;
}

/* Animação da névoa */
@keyframes fog {
    from { transform: translate(0,0); }
    to { transform: translate(-500px, -500px); }
}

/* Texto principal */
h1 {
    color: #8b0000;
    font-size: 70px;
    text-shadow: 
        0 0 10px #ff0000,
        0 0 20px #8b0000,
        0 0 40px #000;
    animation: pulse 2s infinite alternate;
}

/* Pulsação */
@keyframes pulse {
    from { transform: scale(1); opacity: 0.7; }
    to { transform: scale(1.05); opacity: 1; }
}

/* Rosas */
.rose {
    position: absolute;
    top: -50px;
    font-size: 28px;
    animation: fall linear infinite;
    filter: drop-shadow(0 0 10px red);
}

/* Queda */
@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.3;
    }
}
</style>
</head>

<body>

<h1>I Love You 🖤</h1>

<script>
function createRose() {
    const rose = document.createElement("div");
    rose.classList.add("rose");
    rose.innerHTML = "🌹";

    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (4 + Math.random() * 6) + "s";

    document.body.appendChild(rose);

    setTimeout(() => {
        rose.remove();
    }, 10000);
}

setInterval(createRose, 250);
</script>

</body>
</html>
